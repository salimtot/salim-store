<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر النخبة - تسوق بالفخامة</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card-bg: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; }
        
        /* تصميم الواجهة الفخمة */
        header { padding: 50px 20px; text-align: center; background: linear-gradient(to bottom, #1a1a1a, #050505); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 40px; }
        
        .product-card { background: var(--card-bg); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; border: 1px solid #333; transition: 0.4s; }
        .product-card:hover { transform: translateY(-10px); border-color: var(--gold); }
        
        .product-img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
        .price { color: var(--gold); font-size: 1.5em; font-weight: bold; }
        
        .btn-order { background: var(--gold); border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1em; margin-top: 15px; }
        
        /* إضافة تفاصيل تقنية (قسم الوصف) */
        .details { font-size: 0.9em; color: #ccc; margin: 10px 0; line-height: 1.6; }
    </style>
</head>
<body>

<header>
    <h1>متجر النخبة | الفخامة بين يديك</h1>
    <p>أرقى الساعات، العطور، والاكسسوارات</p>
</header>

<div class="grid" id="main-shop"></div>

<script>
    // قاعدة بيانات المنتجات الموسعة
    const storeItems = [
        { name: "ساعة رولكس ذهبية", price: "4900", desc: "ساعة فاخرة بطلاء ذهبي عيار 24، مقاومة للماء والخدش." },
        { name: "عطر النخبة الخاص", price: "450", desc: "تركيبة عطرية فرنسية حصرية تدوم لأكثر من 24 ساعة." },
        { name: "نظارات شمسية كلاسيك", price: "900", desc: "تصميم إيطالي عصري مع حماية كاملة من الأشعة فوق البنفسجية." },
        { name: "قلم فاخر", price: "250", desc: "قلم بتصميم ملكي، مثالي للهدايا الراقية والاجتماعات الهامة." }
    ];

    const shop = document.getElementById('main-shop');

    storeItems.forEach((item, index) => {
        shop.innerHTML += `
            <div class="product-card">
                <img src="https://picsum.photos/400/300?random=${index}" class="product-img">
                <h2>${item.name}</h2>
                <p class="details">${item.desc}</p>
                <span class="price">${item.price} ريال</span>
                <div style="margin-top:15px;">
                    <select id="color-${index}">
                        <option>ذهبي</option><option>أسود</option><option>فضي</option>
                    </select>
                </div>
                <button class="btn-order" onclick="sendWhatsApp(${index})">إتمام الطلب عبر الواتساب</button>
            </div>
        `;
    });

    function sendWhatsApp(i) {
        const item = storeItems[i];
        const color = document.getElementById(`color-${i}`).value;
        const phone = "96877273398";
        window.location.href = `https://wa.me/${phone}?text=أريد طلب: ${item.name} - اللون: ${color}`;
    }
</script>

</body>
</html>
