<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر النخبة | Luxury Store</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 0; }
        
        /* الترويسة */
        header { padding: 80px 20px; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8'); background-size: cover; border-bottom: 3px solid var(--gold); }
        h1 { font-size: 3em; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; }
        
        /* الحاوية */
        .container { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 0 20px; }
        
        /* كرت المنتج */
        .card { background: var(--glass); border: 1px solid #333; padding: 20px; border-radius: 15px; text-align: center; transition: 0.4s; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
        .price { color: var(--gold); font-size: 1.3em; font-weight: bold; display: block; margin: 10px 0; }
        .btn { display: inline-block; background: var(--gold); color: black; padding: 12px 25px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #fff; transform: scale(1.05); }

        /* تذييل الصفحة */
        footer { text-align: center; padding: 40px; color: #666; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <header>
        <h1>متجر النخبة</h1>
        <p>جودة لا تضاهى، وفخامة لا تُنسى</p>
    </header>

    <div class="container" id="product-container">
        </div>

    <footer>جميع الحقوق محفوظة © 2026</footer>

    <script>
        // هنا يمكنك إضافة رقم جوالك للواتساب
        const MY_PHONE = "966500000000"; 
        
        const products = [
            {name: "ساعة رولكس", price: "4900"}, {name: "عطر فرنسي", price: "350"},
            {name: "نظارات شمسية", price: "800"}, {name: "هاتف ذكي", price: "3200"},
            {name: "حذاء رياضي", price: "600"}, {name: "محفظة جلد", price: "250"},
            {name: "سماعات بلوتوث", price: "700"}, {name: "سوار ذهبي", price: "1200"},
            {name: "كاميرا احترافية", price: "4500"}, {name: "لابتوب فخم", price: "8000"},
            {name: "قلم توقيع", price: "400"}, {name: "جاكيت جلد", price: "900"},
            {name: "عقد ألماس", price: "5500"}, {name: "حقيبة سفر", price: "1100"},
            {name: "مصباح مكتبي", price: "300"}, {name: "كرسي قيمنق", price: "1500"},
            {name: "ماوس لاسلكي", price: "200"}, {name: "شاحن متنقل", price: "150"},
            {name: "مكبر صوت", price: "500"}, {name: "خاتم فضة", price: "450"}
        ];

        const container = document.getElementById('product-container');

        products.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="https://picsum.photos/300/200?random=${i}" alt="${p.name}">
                <h3>${p.name}</h3>
                <span class="price">${p.price} ريال</span>
                <a href="https://wa.me/${MY_PHONE}?text=مرحبا، أريد طلب: ${p.name}" class="btn" target="_blank">اطلب عبر واتساب</a>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
