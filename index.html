<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        header { background: #333; color: white; padding: 20px; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .product { background: white; border-radius: 15px; padding: 20px; margin: 15px; width: 250px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .product:hover { transform: scale(1.05); }
        .product img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .price { color: #27ae60; font-size: 1.2em; font-weight: bold; margin: 10px 0; }
        button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #555; }
    </style>
</head>
<body>
    <header><h1>متجري الفخم</h1></header>
    <div class="container">
        <div class="product">
            <img src="https://via.placeholder.com/250" alt="منتج">
            <h3>اسم المنتج الأول</h3>
            <p class="price">299 ريال</p>
            <button>أضف للسلة</button>
        </div>
        </div>
</body>
</html>
